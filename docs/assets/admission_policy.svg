<svg xmlns="http://www.w3.org/2000/svg" width="980" height="460" viewBox="0 0 980 460" role="img">
<style>
text{font-family:Inter,Arial,sans-serif;fill:#17202a} .small{font-size:13px}.label{font-size:15px;font-weight:600}.title{font-size:22px;font-weight:700}.muted{fill:#5d6d7e}.box{fill:#f8fafc;stroke:#ccd6e0;stroke-width:1.5}.green{fill:#1f9d55}.red{fill:#c0392b}.blue{fill:#2471a3}.amber{fill:#d68910}.purple{fill:#6c5ce7}.line{stroke:#2c3e50;stroke-width:2;fill:none}.grid{stroke:#edf2f7;stroke-width:1}
</style>
<rect width="980" height="460" fill="#ffffff"/>
<text x="40" y="48" class="title">Selective degradation policy</text>
<text x="40" y="75" class="small muted">When resources are scarce, TALOS sacrifices non-critical VLM before CV/change workloads.</text>
<rect x="50" y="120" width="880" height="58" rx="8" fill="#eafaf1" stroke="#d8dee6"/>
<text x="75" y="156" class="label">Normal</text>
<text x="285" y="156" class="small">CV ADMIT</text>
<text x="500" y="156" class="small">Change ADMIT</text>
<text x="735" y="156" class="small">VLM ADMIT</text>
<rect x="50" y="192" width="880" height="58" rx="8" fill="#fff7e8" stroke="#d8dee6"/>
<text x="75" y="228" class="label">High load</text>
<text x="285" y="228" class="small">CV ADMIT</text>
<text x="500" y="228" class="small">Change ADMIT</text>
<text x="735" y="228" class="small">VLM DEFER</text>
<rect x="50" y="264" width="880" height="58" rx="8" fill="#fff0f0" stroke="#d8dee6"/>
<text x="75" y="300" class="label">Thermal VLM gate</text>
<text x="285" y="300" class="small">CV ADMIT</text>
<text x="500" y="300" class="small">Change ADMIT</text>
<text x="735" y="300" class="small">VLM DEFER</text>
<rect x="50" y="336" width="880" height="58" rx="8" fill="#f8d7da" stroke="#d8dee6"/>
<text x="75" y="372" class="label">Degraded</text>
<text x="285" y="372" class="small">High-priority CV only</text>
<text x="500" y="372" class="small">REJECT</text>
<text x="735" y="372" class="small">REJECT</text>
<text x="285" y="108" class="small muted">CV_FEATURES</text>
<text x="500" y="108" class="small muted">CHANGE_DETECTION</text>
<text x="735" y="108" class="small muted">VLM_QUERY</text>
</svg>