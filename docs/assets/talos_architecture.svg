<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img">
<style>
text{font-family:Inter,Arial,sans-serif;fill:#17202a} .small{font-size:13px}.label{font-size:15px;font-weight:600}.title{font-size:22px;font-weight:700}.muted{fill:#5d6d7e}.box{fill:#f8fafc;stroke:#ccd6e0;stroke-width:1.5}.green{fill:#1f9d55}.red{fill:#c0392b}.blue{fill:#2471a3}.amber{fill:#d68910}.purple{fill:#6c5ce7}.line{stroke:#2c3e50;stroke-width:2;fill:none}.grid{stroke:#edf2f7;stroke-width:1}
</style>
<rect width="980" height="520" fill="#ffffff"/>
<text x="40" y="48" class="title">TALOS execution architecture</text>
<text x="40" y="75" class="small muted">Control-plane admission, deterministic lease, stateless runtime, read-only telemetry.</text>
<rect x="45" y="130" width="180" height="92" rx="8" fill="#f8fafc" stroke="#ccd6e0" stroke-width="1.5"/>
<text x="63" y="166" class="label">L1 Ingestion</text>
<text x="63" y="194" class="small muted">Frame/task arrives</text>
<rect x="285" y="130" width="190" height="92" rx="8" fill="#eef7ff" stroke="#ccd6e0" stroke-width="1.5"/>
<text x="303" y="166" class="label">L3 Controller</text>
<text x="303" y="194" class="small muted">state + admission</text>
<rect x="535" y="130" width="180" height="92" rx="8" fill="#fff7e8" stroke="#ccd6e0" stroke-width="1.5"/>
<text x="553" y="166" class="label">GPU Lease</text>
<text x="553" y="194" class="small muted">single active owner</text>
<rect x="775" y="130" width="160" height="92" rx="8" fill="#f3fff5" stroke="#ccd6e0" stroke-width="1.5"/>
<text x="793" y="166" class="label">C++ Runtime</text>
<text x="793" y="194" class="small muted">execute only</text>
<line x1="225" y1="176" x2="285" y2="176" stroke="#34495e" stroke-width="2"/><polygon points="285,176 276,171 276,181" fill="#34495e"/>
<line x1="475" y1="176" x2="535" y2="176" stroke="#34495e" stroke-width="2"/><polygon points="535,176 526,171 526,181" fill="#34495e"/>
<line x1="715" y1="176" x2="775" y2="176" stroke="#34495e" stroke-width="2"/><polygon points="775,176 766,171 766,181" fill="#34495e"/>
<rect x="285" y="310" width="430" height="116" rx="8" fill="#fbfcfd" stroke="#ccd6e0" stroke-width="1.5"/>
<text x="310" y="346" class="label">Read-only telemetry</text>
<text x="310" y="375" class="small muted">tegrastats/sysfs/jtop update memory, temperature, GPU load.</text>
<text x="310" y="404" class="small muted">Telemetry cannot mutate state; it only changes admission decisions.</text>
<path d="M500 310 C500 270 380 250 380 222" class="line"/>
<path d="M500 310 C500 270 620 250 620 222" class="line"/>
<rect x="45" y="300" width="180" height="126" rx="8" fill="#fffafa" stroke="#f0b7b7" stroke-width="1.5"/>
<text x="65" y="335" class="label">Hard invariant</text>
<text x="65" y="365" class="small muted">One GPU-heavy task</text>
<text x="65" y="390" class="small muted">at a time.</text>
<text x="65" y="415" class="small red">No runtime policy leakage.</text>
</svg>